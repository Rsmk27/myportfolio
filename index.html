      <section>
        <h2>About</h2>
        <p>I am an Electrical and Electronics Engineering student focused on Embedded Systems, IoT, Smart Energy Technologies, and Industrial Automation — turning real-world engineering problems into reliable, scalable solutions.</p>
        <p>I work at the intersection of hardware, software, and energy systems. My experience spans designing sensor-driven automation systems, building IoT-based control platforms, and developing renewable-energy solutions including solar-powered dewatering systems and automated monitoring platforms.</p>
        <p>Through industrial training at Coromandel International Limited, I built a strong foundation in power systems, electrical machines, control systems, and industrial maintenance.</p>
      </section>

      <section>
        <h2>Projects</h2>

        <h3>Firefighter Safety Device</h3>
        <p>An IoT-based wearable safety device that monitors a firefighter's physical condition, movement, and location in real time, presented on a web dashboard. Built with ESP32, Firebase, React, MPU-6050, DHT11, and Neo-6M GPS.</p>
        <p><a href="https://sfmd.rsmk.co.in/">View Project →</a></p>

        <h3>ColorOhm</h3>
        <p>A precision resistor color code calculator published as an Android app and web tool. Supports 4-band and 5-band standards with zero latency decoding. Built with React Native, Expo, and JavaScript.</p>
        <p><a href="https://colorohm.rsmk.me/">View Project →</a></p>

        <h3>Automatic Exhaust Fan</h3>
        <p>Intelligent ventilation system that detects harmful gases and smoke using an MQ-2 sensor, with an auto-off timer and manual override. Built with Arduino and C++.</p>
        <p><a href="https://autoexhaustfan.rsmk.co.in/">View Project →</a></p>

        <h3>Solar-Powered Dewatering System</h3>
        <p>SIH project replacing diesel-based agricultural dewatering with solar energy. Arduino-controlled with soil moisture sensing and LDR-based solar tracking.</p>
        <p><a href="https://spds.rsmk.me/">View Project →</a></p>

        <h3>Single Axis Solar Tracker</h3>
        <p>A relay-logic solar panel tracker using LDR sensors on a single axis with gear motor. Achieves ~30% efficiency gain over fixed panels — no microcontroller required.</p>

        <h3>Automatic Streetlight System</h3>
        <p>A fully solar-powered automatic streetlight that switches on at dusk and off at dawn using IC 555 timer and LDR sensing.</p>
        
        <h3>Agri Rover</h3>
        <p>A web-controlled multi-rover agricultural system with live video streaming, GPS tracking, and AI integration for plant disease identification. Built with ESP32-CAM, Firebase, and Groq API.</p>
        <p><a href="https://github.com/Rsmk27/multi-rover">View Project on GitHub →</a></p>
      </section>
